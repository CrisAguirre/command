<!-- Login Screen -->
<div class="login-container" *ngIf="!isLoggedIn">
  <div class="login-box">
    <h1 class="site-title">⚡ Command Center</h1>
    <p class="login-subtitle">AUTH REQUIRED</p>
    
    <div class="login-form">
      <div class="form-group">
        <label>USERNAME</label>
        <input type="text" [(ngModel)]="loginUsername" placeholder="Ingrese su usuario" (keyup.enter)="login()">
      </div>
      
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" [(ngModel)]="loginPassword" placeholder="Ingrese su contraseña" (keyup.enter)="login()">
      </div>
      
      <div class="error-msg" *ngIf="loginError">Access Denied. Invalid credentials.</div>
      
      <button class="btn-login" (click)="login()">INITIALIZE LINK</button>
    </div>
  </div>
</div>

<!-- Main Application -->
<ng-container *ngIf="isLoggedIn">
<!-- Header -->
<header class="site-header">
  <h1 class="site-title">⚡ Command Center</h1>
</header>

<!-- Panels Grid -->
<div class="dashboard" *ngIf="loaded">

  <div class="panel-wrapper"
       *ngFor="let panel of panels; let pIndex = index"
       [style.--theme-color]="panel.color"
       [style.--theme-rgb]="panel.colorRgb">

    <!-- 3D Box -->
    <div class="box" [class.is-active]="panel.active" (click)="togglePanel(panel)">

      <!-- Front face -->
      <div class="face front">
        <div class="front-content">
          <span class="panel-icon">{{ panel.icon }}</span>
          <h2>{{ panel.name }}</h2>
          <div class="indicator"></div>
          <span class="task-count">{{ panel.todos.length }} tareas</span>
        </div>
      </div>

      <!-- Other faces -->
      <div class="face back"></div>
      <div class="face face-left"></div>
      <div class="face face-right"></div>
      <div class="face face-bottom"></div>

      <!-- Lid (hinged top) -->
      <div class="lid-hinge">
        <div class="face face-top"></div>
      </div>

      <!-- Floor glow -->
      <div class="floor-reflection"></div>
    </div>

  </div>

</div>

<!-- Floating Task Panel (appears when a panel is active) -->
<ng-container *ngFor="let panel of panels; let pIndex = index">
  <div class="task-overlay" 
       *ngIf="panel.active"
       [style.--theme-color]="panel.color"
       [style.--theme-rgb]="panel.colorRgb">
    
    <div class="task-card" (click)="stopProp($event)">
      <div class="task-card-header">
        <span class="task-card-icon">{{ panel.icon }}</span>
        <h3>{{ panel.name }}</h3>
        <button class="btn-close" (click)="togglePanel(panel)">✕</button>
      </div>

      <div class="tasks-scroll">
        <ul class="task-list">
          <li *ngFor="let task of panel.todos; let tIndex = index" class="task-item">
            <!-- View mode -->
            <ng-container *ngIf="panel.editingIndex !== tIndex">
              <span class="task-checkbox" (click)="removeTask(panel, tIndex, $event)" title="Completar/Eliminar">✓</span>
              <span class="task-text" (dblclick)="startEditing(panel, tIndex)">{{ task }}</span>
              <button class="btn-edit" (click)="startEditing(panel, tIndex)" title="Editar">✏️</button>
            </ng-container>

            <!-- Edit mode -->
            <ng-container *ngIf="panel.editingIndex === tIndex">
              <input class="edit-input"
                     [(ngModel)]="panel.editValue"
                     (keydown.enter)="confirmEdit(panel)"
                     (keydown.escape)="cancelEdit(panel)"
                     (blur)="confirmEdit(panel)" />
            </ng-container>
          </li>
        </ul>
      </div>

      <button class="btn-add" (click)="addTask(panel)">+ Agregar tarea</button>
    </div>

  </div>
</ng-container>

<!-- Dashboard Footer -->
<footer class="site-footer">
  <button class="btn-logout" (click)="logout()">SALIR</button>
</footer>

</ng-container>
